workflow: devils_advocate

phases:
  research_counter_evidence:
    - MiniMax-M2.5-highspeed
  find_alternatives:
    - MiniMax-M2.5-highspeed
  build_critique:
    - claude-opus-4-6-20250501     # MUST be opus for strong critique
  defend_proposal:
    - claude-sonnet-4-6-20250501   # MUST be different model
  judge_verdict:
    - claude-opus-4-6-20250501     # opus for impartial judgment
