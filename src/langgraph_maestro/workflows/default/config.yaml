workflow: default

phases:
  decompose:
    - claude-sonnet-4-6
  execute:
    - claude-sonnet-4-6
  review:
    - claude-sonnet-4-6
  critique:
    enabled: false
    models:
      - claude-sonnet-4-6
  test_gen:
    enabled: false
    models:
      - claude-sonnet-4-6
  verify:
    enabled: true

loops:
  max_critique_rounds: 1
  max_review_rounds: 2
  max_replan_rounds: 1

escalation:
  enabled: false
  confidence_threshold: 0.3

skills:
  model_overlays:
    minimax: |
      You must return valid JSON without markdown fences.
      Do not add preamble or commentary — JSON only.

prompt_engineering:
  enabled: true
  model: claude-sonnet-4-6
  phases:
    decompose:
      enabled: true
    execute:
      enabled: true
    review:
      enabled: true
  timeout: 120
  fallback_to_raw: true

timeouts:
  default: 300
  models:
    minimax: 300
    claude: 600
  stall:
    no_progress_threshold: 3
    loop_detection_window: 5
