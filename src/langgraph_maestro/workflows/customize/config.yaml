workflow: customize

description: |
  Multi-round interview-driven workflow customization.
  Asks targeted questions, synthesizes answers into a domain profile,
  generates a tailored LangGraph workflow, and validates the output.

phases:
  interview:
    - claude-sonnet-4-6
  collect:
    - claude-sonnet-4-6
  synthesize:
    - claude-sonnet-4-6
  generate:
    - claude-sonnet-4-6
  validate:
    - claude-sonnet-4-6

skills:
  model_overlays:
    minimax: |
      You must return valid JSON without markdown fences.
      Do not add preamble or commentary — JSON only.

timeouts:
  default: 300
  models:
    minimax: 300
    claude: 600
