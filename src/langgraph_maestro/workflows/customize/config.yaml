workflow: customize

description: |
  Analyzes user requests and customizes an existing workflow
  to better suit their needs by selecting the best-fit workflow
  and generating customization specifications.

phases:
  survey:
    - minimax
  match:
    - MiniMax-M2.5-highspeed
  spec:
    - MiniMax-M2.5-highspeed
  output:
    - minimax

skills:
  model_overlays:
    minimax: |
      You must return valid JSON without markdown fences.
      Do not add preamble or commentary — JSON only.

timeouts:
  default: 300
  models:
    minimax: 300
    claude: 600
