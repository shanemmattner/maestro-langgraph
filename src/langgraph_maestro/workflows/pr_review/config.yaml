workflow: pr_review

reviewers:
  - security
  - correctness
  - tests
  - architecture

phases:
  fetch:
    - claude-sonnet-4-6
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4
  analyze:
    - claude-sonnet-4-6
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4
  synthesize:
    - claude-sonnet-4-6
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4

  # Two-tier escalation: first_pass used on initial review, escalation on REJECT
  escalation:
    - claude-sonnet-4-6

# Escalation settings for two-tier review
escalation:
  enabled: true
  # Verdict values that trigger escalation
  trigger_verdicts:
    - REQUEST_CHANGES
    - REJECT
  # Pass prior issues as context to escalation model
  include_prior_issues: true

skills:
  model_overlays:
    minimax: |
      You must return valid JSON without markdown fences.
      Do not add preamble or commentary — JSON only.

  prompt_engineering:
    enabled: true
    model: claude-sonnet-4-6
    phases:
      decompose:
        enabled: false
      analyze:
        enabled: true
      synthesize:
        enabled: false
    timeout: 120
    fallback_to_raw: true

timeouts:
  default: 300
  models:
    minimax: 300
    claude: 600
  stall:
    no_progress_threshold: 3
    loop_detection_window: 5
