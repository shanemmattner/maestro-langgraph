workflow: e2e_test

# Retry configuration
max_retries: 3

phases:
  analyze:
    - MiniMax-M2.5-highspeed
  design:
    - MiniMax-M2.5-highspeed
  generate:
    - MiniMax-M2.5-highspeed
  execute:
    - MiniMax-M2.5-highspeed
  evaluate:
    - MiniMax-M2.5-highspeed
  report:
    - MiniMax-M2.5-highspeed

# Test framework settings
test_framework:
  default: pytest
  frameworks:
    - pytest
    - unittest
    - playwright

# Code analysis settings
analysis:
  # Files/paths to analyze
  include_patterns:
    - "*.py"
    - "*.ts"
    - "*.js"
  # Paths to exclude
  exclude_patterns:
    - "*_test.py"
    - "test_*.py"
    - "*/tests/*"
    - "*/test/*"

# Test execution settings
execution:
  timeout: 300  # seconds
  parallel: false
  capture_output: true

skills:
  model_overlays:
    minimax: |
      You must return valid JSON without markdown fences.
      Do not add preamble or commentary — JSON only.

  prompt_engineering:
    enabled: true
    model: MiniMax-M2.5-highspeed
    phases:
      analyze:
        enabled: true
      design:
        enabled: true
      generate:
        enabled: true
      execute:
        enabled: false
      evaluate:
        enabled: true
      report:
        enabled: true
    timeout: 120
    fallback_to_raw: true

timeouts:
  default: 300
  models:
    minimax: 300
    claude: 600
  stall:
    no_progress_threshold: 3
    loop_detection_window: 5
