# =============================================================================
# Maestro Configuration
# =============================================================================
#
# Pipeline settings and model preferences for multi-agent orchestration.
#
# COST ANALYSIS (2026-01):
#   Claude Max subscription (when maxed out):
#     - Sonnet: ~$0.08-0.17/M tokens (vs $3-15/M API)
#     - Opus:   ~$0.26-0.51/M tokens (vs $15-75/M API)
#   OpenRouter cheap models: $0.03-0.40/M but unreliable (rate limits, no tools)
#
#   RECOMMENDATION: Use Claude subscription for everything. It's cheaper AND
#   more reliable than OpenRouter. Keep RAC for experimentation only.
#
# Model order matters: First = preferred, rest = fallbacks (tried in order)
#
# Pipeline phases:
#   clarity         - Evaluate issue clarity (needs strong reasoning)
#   preflight       - Repo checks (deterministic)
#   decompose       - Agent explores code, breaks issue into chunks (needs reasoning + tools)
#   execute         - Workers implement chunks using TDD (needs fast execution)
#   review          - Code review (needs critical analysis)
#   acceptance_test - E2E acceptance tests (after review, verifies feature works)
#
# Codex reasoning levels:
#   :xhigh  - Best quality, slowest
#   :high   - Balanced
#   :medium - Fastest
#
# =============================================================================

pipeline:
  # Execution settings
  # ---------------------------------------------------------------------------
  # IMPORTANT: OpenAI has an undocumented concurrent request limit of ~8
  # connections per organization, regardless of your tier's TPM/RPM limits.
  # Running more parallel agents causes silent failures where requests hang
  # or get dropped without error messages.
  #
  # References:
  #   - https://community.openai.com/t/concurrent-request-restriction/1062443
  #   - https://github.com/openai/codex/issues/2629
  #
  # Recommended: Keep max_workers at 3-4 to stay safely under the limit,
  # since each agent may make multiple concurrent API calls.
  # ---------------------------------------------------------------------------
  max_workers: 5  # Max parallel subtasks per wave (3 accounts × 5 sessions = 15 slots)
  max_system_runners: 8  # Max concurrent runner processes system-wide (CLI + scheduler + clones)

  # Test Harness Configuration
  # ---------------------------------------------------------------------------
  # Controls how tests are discovered and executed during validation.
  #
  # Options:
  #   auto   - Auto-detect test harness based on project type (default)
  #   none   - Use existing run_validation_commands behavior
  #   python - Force Python package harness (pytest, mypy, ruff)
  # ---------------------------------------------------------------------------
  # harness: auto  # Uncomment to override (default: auto)
  # Clarity Gate (needs strong reasoning to assess issue quality)
  clarity:
    - claude-sonnet-4-6                           # Sonnet primary
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # 122B fallback

  # Research & Planning (analytics/insights/meta)
  research:
    - claude-sonnet-4-6                           # Sonnet primary
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # 122B fallback

  # Explorer sub-agents: spawned by decomposer to explore codebase
  # 122B local model via RAC routing in mc.py — falls back to sonnet if local unavailable
  explorer:
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # Local 122B (free, fast)
    - claude-sonnet-4-6                           # Cloud fallback

  # Decompose phase: agent explores code, breaks issue into chunks
  # Needs strong reasoning to identify good work boundaries
  decompose:
    - claude-sonnet-4-6                           # Sonnet primary
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # 122B fallback

  # Planner phase: create detailed implementation plans for each chunk
  planner:
    - claude-sonnet-4-6                           # Sonnet primary
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # 122B fallback

  # Repair phase: fix validation failures
  repair:
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # 122B primary (targeted fixes)
    - claude-sonnet-4-6                           # Cloud fallback

  # Execute phase: workers implement chunks using TDD
  # 122B local model primary — free, fast, no API cost
  execute:
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # Local 122B primary
    - claude-sonnet-4-6                           # Cloud fallback
  execute_l1:
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # Local 122B primary
    - claude-sonnet-4-6                           # Cloud fallback

  # Review
  review:
    - claude-sonnet-4-6                           # Sonnet primary
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # 122B fallback

  # PR Review pipeline — second pipeline (review open PRs, fix, merge)
  pr_reviewer:
    - claude-sonnet-4-6          # Sonnet for PR review
  pr_fixer:
    - arthurcollet/Qwen3.5-122B-A10B-mlx-nvfp4  # 122B primary for code fixes
    - claude-sonnet-4-6                           # Cloud fallback

  # Acceptance Test
  # ---------------------------------------------------------------------------
  # Run E2E acceptance tests after the review phase to verify the feature works
  # end-to-end. When smoke_only is true, only quick smoke tests are executed.
  # Full acceptance tests can be triggered on demand via full_on_demand.
  #
  # Options:
  #   enabled          - Enable/disable acceptance test phase (default: true)
  #   smoke_only       - Run only smoke tests (default: true)
  #   full_on_demand   - Allow full test suite on demand (default: false)
  #   timeout_seconds  - Timeout for acceptance test execution (default: 300)
  #   retry_on_fail    - Retry failed acceptance tests (default: true)
  #   max_retries      - Maximum retry attempts (default: 2)
  # ---------------------------------------------------------------------------
  acceptance_test:
    enabled: true
    smoke_only: true
    full_on_demand: false
    timeout_seconds: 300
    retry_on_fail: true
    max_retries: 2

  # Validation
  # ---------------------------------------------------------------------------
  # Run validation checks (type checking, linting, tests) after each phase.
  # Commands are auto-detected based on project configuration (pyproject.toml,
  # package.json, etc.) if not explicitly specified.
  #
  # Options:
  #   enabled              - Enable/disable validation (default: true)
  #   fail_on_error        - Fail pipeline on validation errors (default: true)
  #   max_repair_attempts  - Max auto-fix attempts on validation failure (default: 2)
  #   repair_on_failure    - Auto-fix validation failures (default: true)
  #   skip_validation      - Temporarily skip validation (for test cleanup)
  #   commands             - Override auto-detected commands (optional)
  #     type_check         - Type checking command (e.g., "uv run mypy src")
  #     lint               - Linting command (e.g., "uv run ruff check src")
  #     test               - Test command (e.g., "uv run pytest tests")
  # ---------------------------------------------------------------------------
  validate:
    enabled: true                # Enable validation checks
    fail_on_error: true          # Fail pipeline if validation fails
    max_repair_attempts: 2       # Max auto-fix attempts (0 to disable)
    repair_on_failure: true      # Auto-fix validation failures
    skip_validation: true        # TEMPORARY: Skip until test suite cleanup complete (issue #460)
    timeout_seconds: 600         # Test suite takes ~440s, give headroom
    commands:
      # typecheck disabled: 254 pre-existing pyright errors from optional deps
      # Re-enable when pyright errors are resolved (see issue #252)
      # typecheck: "uv run pyright"
      lint: "uv run ruff check src/ tests/ --exclude _version.py"
      test: "uv run pytest tests/ -x -q -n auto"  # -n auto = parallel via pytest-xdist

  # Post-Completion Actions
  # ---------------------------------------------------------------------------
  # Configure automated actions after pipeline completes successfully.
  #
  # Options:
  #   create_pr                - Auto-create pull request (default: false)
  #   auto_review              - Run automated code review (default: false)
  #   review_prompt            - Path to review prompt template (default: config/pr-review.md)
  #   review_output            - Output path for review results (default: {workspace}/pr-review.md)
  #   block_on_review_failure  - Block PR creation if review fails (default: false)
  # ---------------------------------------------------------------------------
  # post_completion:
  #   create_pr: false
  #   auto_review: false
  #   review_prompt: config/pr-review.md
  #   review_output: '{workspace}/pr-review.md'
  #   block_on_review_failure: false

  # Skill Injection
  # ---------------------------------------------------------------------------
  # Automatically inject skills into pipeline worktrees based on configuration.
  # Skills are copied from source to worktree's .claude/skills/ directory.
  #
  # Skill source resolution (in order):
  #   1. MAESTRO_SKILL_SOURCE env var (if set)
  #   2. data/pipeline-skills/ in the maestro repo
  #   3. source_repo/.claude/skills/ (auto-detected)
  #
  # Options:
  #   always  - List of skills always injected
  #   auto    - List of rules with 'patterns' (globs) and 'skills'
  #   phases  - Dict mapping phase names to skill lists
  # ---------------------------------------------------------------------------
  inject_skills:
    always:
      - web-search
    phases:
      execute: [code-patterns, test-patterns]

  # Prompt Engineering middleware
  # ---------------------------------------------------------------------------
  # Before feeding a prompt to each pipeline phase, run a full PE audit
  # (15-item checklist, T1-T16 techniques) via minimax-agent and rewrite it.
  # The downstream agent receives the improved prompt — it never sees the original.
  #
  # enabled: false by default in the main profile (adds ~5-10min per pipeline run).
  # Enable in maestro-minimax.yaml or set per-run with MAESTRO_PE_ENABLED=1.
  #
  # phases: which pipeline phases get a PE pass before their agent call
  #   decompose  — improves the issue text before the decomposer sees it
  #   task-plan  — improves each subtask description before task-planner
  #   execute    — improves each implementation plan before the implementer
  # ---------------------------------------------------------------------------
  prompt_engineering:
    enabled: false
    model: minimax/minimax-m2.5-highspeed
    phases: [decompose, task-plan, execute]
    max_rounds: 20
    timeout: 600

  # Retry and timeout configuration
  # ---------------------------------------------------------------------------
  retries:
    max_retries: 3
    max_effective_timeout: 3600

  timeouts:
    agent_default: 600
    startup_grace: 300
    result_exit: 30
    default_stall: 120
    content_stall_multiplier: 2.0
    models:
      opus: 900
      sonnet: 600
      haiku: 300
    phases:
      decomposer: 1200
      implementer: 900
      execute: 900
      scheduler: 600
      task-planner: 600
      reviewer: 600
      fixer: 600
      prepper: 600
      test-planner: 600
    stall:
      decomposer: 120
      implementer: 120
      scheduler: 120
      task-planner: 120
      reviewer: 120
      fixer: 120
      prepper: 120
      pr-reviewer: 180

  # Per-agent MiniMax settings
  agents:
    decomposer:
      max_rounds: 100
    implementer:
      max_rounds: 100
    task-planner:
      max_rounds: 100
    scheduler:
      max_rounds: 100
    reviewer:
      max_rounds: 100
    _json_repair:
      max_rounds: 3    # rounds for the cheap JSON repair call on parse failure

  # Observability
  # ---------------------------------------------------------------------------
  # Langfuse tracing for pipeline executions, task runs, and LLM generations.
  #
  # Configuration via environment variables (see docs/ENVIRONMENT.md):
  #   LANGFUSE_SECRET_KEY    - API secret key from Langfuse project settings
  #   LANGFUSE_PUBLIC_KEY    - API public key from Langfuse project settings
  #   LANGFUSE_BASE_URL      - Langfuse host URL (default: https://cloud.langfuse.com)
  #   MAESTRO_TRACING_ENABLED - Set to "0" to disable tracing (default: "1")
  #
  # Langfuse setup:
  #   Cloud: https://cloud.langfuse.com
  #   Self-hosted: https://langfuse.com/docs/deployment/self-host
  # ---------------------------------------------------------------------------

models:
  claude:
    - claude-opus-4-5-20251101
    - claude-sonnet-4-5-20250929
  openrouter: # For RAC runner - EXPERIMENTATION ONLY (Claude subscription is cheaper!)
    # ⚠️  USE CLAUDE SUBSCRIPTION BY DEFAULT - it's cheaper and more reliable
    # These models are for experimentation, testing new models, or edge cases.
    #
    # 📖 RAC FALLBACK DOCS: ../../../docs/rac-claude-code-fallback.md
    # When Claude Code is down, use RAC with these models.
    #
    # Account has Zero Data Retention (ZDR) policy enabled
    # Only models from ZDR endpoint work: https://openrouter.ai/api/v1/endpoints/zdr
    # CRITICAL: Model must support tool/function calling!
    #
    # PAID TIER - ZDR + TOOL SUPPORT - tested 2026-02-15
    - deepseek/deepseek-v3.2               # $0.26/M, 163K, TOOLS ✓, fast (5.8s/2 turns)
    - moonshotai/kimi-k2.5                 # $0.45/M, 262K, TOOLS ✓, slower (23.8s)
    - minimax/minimax-m2.5                 # $0.20/M, 204K, TOOLS ✓, slow (45s)
    #
    # FREE TIER - ZDR + TOOL SUPPORT - tested 2026-01-28 (rate limited, unreliable)
    - arcee-ai/trinity-large-preview:free  # FREE, 131K, TOOLS ✓, works but rate limited
    - qwen/qwen3-coder:free                # FREE, 262K, TOOLS ✓, rate limited
    - z-ai/glm-4.5-air:free                # FREE, 131K, TOOLS ✓
    #
    # ⚠️  NEVER use anthropic/* here - we have Claude free via subscription

# =============================================================================
# LangGraph Configuration
# =============================================================================
#
# Model preferences per phase for LangGraph pipeline.
# When call_llm is called with a `phase` parameter, it will look up the model
# from here instead of using the default.
#
# Phase names should match MaestroState.phase values:
#   clarity         - Evaluate issue clarity
#   decompose      - Agent explores code, breaks issue into chunks
#   execute        - Workers implement chunks using TDD
#   review         - Code review
#   acceptance_test - E2E acceptance tests
#
# =============================================================================

langgraph:
  # Model preferences per phase (first = primary, rest = fallbacks)
  models:
    clarity:
      - claude-sonnet-4-6-20250501
    
    decompose:
      - claude-sonnet-4-6-20250501
    
    execute:
      - claude-sonnet-4-6-20250501
    
    review:
      - claude-sonnet-4-6-20250501
    
    acceptance_test:
      - claude-sonnet-4-6-20250501

