apiVersion: 1

providers:
  - name: 'LLM Pipeline Dashboards'
    orgId: 1
    folder: 'LLM Pipeline'
    folderUid: 'llm-pipeline'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
