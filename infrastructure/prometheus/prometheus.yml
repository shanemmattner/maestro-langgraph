global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'maestro-observability'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Langfuse metrics endpoint (placeholder — verify Langfuse v3 exposes /metrics)
  - job_name: 'langfuse'
    static_configs:
      - targets: ['langfuse-web:3000']
    metrics_path: '/api/public/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
